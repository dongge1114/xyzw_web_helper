name: Build FullStack App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: windows-latest
    outputs:
      frontend-built: ${{ steps.build.outputs.built }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Mark as built
        id: build
        run: echo "built=true" >> $GITHUB_OUTPUT

  build-electron:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Electron & Builder
        run: pnpm add -D electron electron-builder

      - name: Create Electron main process file
        run: |
          mkdir electron
          echo "const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow () {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                preload: path.join(__dirname, 'preload.js')
              }
            });

            // Load the built Vue app
            win.loadFile(path.join(__dirname, '../dist/index.html'));

            // Open DevTools in development
            if (!app.isPackaged) {
              win.webContents.openDevTools();
            }
          }

          app.whenReady().then(() => {
            createWindow();

            app.on('activate', () => {
              if (BrowserWindow.getAllWindows().length === 0) {
                createWindow();
              }
            });
          });

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });" > electron/main.js

      - name: Create preload script
        run: |
          echo "// Preload script for Electron
          console.log('Electron preload script loaded');" > electron/preload.js

      - name: Create Electron config
        run: |
          echo "{
            \"name\": \"xyzw-web-helper\",
            \"version\": \"1.0.0\",
            \"description\": \"Web helper tool\",
            \"main\": \"main.js\",
            \"scripts\": {
              \"start\": \"electron .\"
            },
            \"keywords\": [],
            \"author\": \"\",
            \"license\": \"ISC\",
            \"devDependencies\": {
              \"electron\": \"^latest\",
              \"electron-builder\": \"^latest\"
            },
            \"build\": {
              \"appId\": \"com.electron.xyzwebhelper\",
              \"productName\": \"XYZW Web Helper\",
              \"directories\": {
                \"output\": \"release\"
              },
              \"files\": [
                \"../dist/**/*\",
                \"main.js\",
                \"preload.js\"
              ],
              \"win\": {
                \"target\": \"nsis\",
                \"icon\": \"icon.ico\"
              }
            }
          }" > electron/package.json

      - name: Build Electron app
        run: |
          cd electron
          npx electron-builder --win --config package.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-windows
          path: electron/release/*.exe

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          cd server
          pip install -r requirements.txt

      - name: Create backend package
        run: |
          # Create a standalone Python executable using PyInstaller
          pip install pyinstaller
          cd server
          pyinstaller --onefile --add-data "templates:templates" --add-data "static:static" --hidden-import="flask_login" app.py
          mkdir -p ../backend-package
          cp dist/app ../backend-package/
          cp -r templates static ../backend-package/
          cp requirements.txt ../backend-package/
          echo "# XYZW Backend Service
          ## Usage
          1. Install Python 3.x
          2. Run: \`pip install -r requirements.txt\`
          3. Start: \`python app.py\`
          4. Access: http://localhost:5000" > ../backend-package/README.md

      - name: Upload backend package
        uses: actions/upload-artifact@v4
        with:
          name: backend-service
          path: backend-package/
