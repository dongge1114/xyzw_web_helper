name: Build Node.js EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 使用 Node.js 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies with pnpm
        run: pnpm install # 使用 pnpm 安装依赖

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE with pkg
        run: |
          # 检查 package.json 中的 main 或 bin 字段，确定入口文件
          # 假设入口文件是 index.js 或根据 package.json 配置
          # 如果 package.json 中有 bin 字段，则 pkg . 会自动识别
          # 否则，需要明确指定入口文件，例如 pkg index.js
          # 先尝试自动识别
          pkg . --targets node18-win-x64 --output xyzw_web_helper.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xyzw_web_helper-EXE
          path: xyzw_web_helper.exe
