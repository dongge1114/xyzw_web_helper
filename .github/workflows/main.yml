name: Build FullStack App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: windows-latest
    outputs:
      frontend-built: ${{ steps.build.outputs.built }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Mark as built
        id: build
        run: echo "built=true" >> $GITHUB_OUTPUT

  build-electron:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Electron & Builder
        run: |
          mkdir electron
          cd electron
          npm init -y
          npm install electron --save-dev
          npm install electron-builder --save-dev

      - name: Create Electron main process file
        run: |
          @'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          // Handle creating/removing shortcuts on Windows when installing/uninstalling.
          if (require('electron-squirrel-startup')) {
            app.quit();
          }

          const createWindow = () => {
            // Create the browser window.
            const mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                nodeIntegration: false,
                contextIsolation: true
              }
            });

            // and load the index.html of the app.
            mainWindow.loadFile(path.join(__dirname, '../dist/index.html'));

            // Open the DevTools.
            if (!app.isPackaged) {
              mainWindow.webContents.openDevTools();
            }
          };

          // This method will be called when Electron has finished
          // initialization and is ready to create browser windows.
          // Some APIs can only be used after this event occurs.
          app.whenReady().then(() => {
            createWindow();

            app.on('activate', () => {
              // On OS X it's common to re-create a window in the app when the
              // dock icon is clicked and there are no other windows open.
              if (BrowserWindow.getAllWindows().length === 0) {
                createWindow();
              }
            });
          });

          // Quit when all windows are closed, except on macOS. There, it's common
          // for applications and their menu bar to stay active until the user quits
          // explicitly with Cmd + Q.
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });

          // In this file you can include the rest of your app's specific main process
          // code. You can also put them in separate files and import them here.
          '@ | Out-File -FilePath electron\main.js -Encoding utf8

      - name: Create preload script
        run: |
          @'
          /**
           * The preload script runs in a sandboxed renderer process before the
           * renderer process is loaded. It has access to node.js APIs and can
           * communicate with the main process via the contextBridge API.
           */
          const { contextBridge } = require('electron');

          // Expose protected methods that allow the renderer process to use
          // the ipcRenderer without exposing the entire object
          contextBridge.exposeInMainWorld('electronAPI', {
            // Example API call
            // ping: () => ipcRenderer.invoke('ping')
          });
          '@ | Out-File -FilePath electron\preload.js -Encoding utf8

      - name: Create index.html placeholder
        run: |
          @'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>XYZW Web Helper</title>
          </head>
          <body>
            <div id="app">Loading XYZW Web Helper...</div>
            <!-- The actual Vue app will be injected here -->
          </body>
          </html>
          '@ | Out-File -FilePath electron\index.html -Encoding utf8

      - name: Update package.json for Electron
        run: |
          cd electron
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $packageJson | Add-Member -NotePropertyName "main" -NotePropertyValue "main.js"
          $packageJson | Add-Member -NotePropertyName "build" -NotePropertyValue @{
            "appId" = "com.electron.xyzwebhelper"
            "productName" = "XYZW Web Helper"
            "directories" = @{
              "output" = "release"
            }
            "files" = @(
              "../dist/**/*",
              "main.js",
              "preload.js",
              "index.html"
            )
            "win" = @{
              "target" = "nsis"
              "icon" = "icon.ico"
            }
          }
          $packageJson.scripts | Add-Member -NotePropertyName "start" -NotePropertyValue "electron ."
          $packageJson | ConvertTo-Json -Depth 10 | Out-File -FilePath package.json -Encoding utf8

      - name: Build Electron app
        run: |
          cd electron
          npx electron-builder --win --config --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-windows
          path: electron\release\*.exe

  build-cloudflare-worker:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Check for _worker.js
        run: |
          if [ -f "dist/_worker.js" ]; then
            echo "_worker.js found in dist folder"
            mkdir -p cloudflare-package
            cp -r dist/* cloudflare-package/
            echo "# XYZW Cloudflare Worker Package
            ## Deployment Instructions
            1. Install Wrangler: \`npm install -g wrangler\`
            2. Login to Cloudflare: \`wrangler login\`
            3. Create a new Pages project in Cloudflare Dashboard
            4. Connect to Git or upload these files
            5. Set build command to: \`npm run build\`
            6. Set build output directory to: \`dist\`
            
            The _worker.js file will automatically enable Advanced Mode for API proxying." > cloudflare-package/README.md
          else
            echo "No _worker.js found in dist folder"
            mkdir -p cloudflare-package
            cp -r dist/* cloudflare-package/
            echo "# XYZW Frontend Package
            ## Local Preview
            1. Install Wrangler: \`npm install -g wrangler\`
            2. Build project: \`npm run build\`
            3. Preview: \`npx wrangler pages dev dist\`
            4. Access: http://localhost:8787
            
            For full functionality including API proxying, deploy to Cloudflare Pages which will automatically recognize _worker.js if present." > cloudflare-package/README.md
          fi

      - name: Upload Cloudflare package
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-package
          path: cloudflare-package/
