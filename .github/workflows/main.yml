name: Build Vue.js App with Electron

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies with pnpm
        run: pnpm install

      - name: Build Vue Project
        run: pnpm build # 这会执行 package.json 中的 build 脚本

      - name: Install Electron Builder
        run: npm install -g electron-builder

      - name: Create Electron Wrapper
        run: |
          # 创建一个简单的 Electron 主进程文件
          echo "const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow () {
            const mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                preload: path.join(__dirname, 'preload.js')
              }
            });

            mainWindow.loadFile('./dist/index.html'); // 加载构建后的 index.html
          }

          app.whenReady().then(() => {
            createWindow();

            app.on('activate', function () {
              if (BrowserWindow.getAllWindows().length === 0) createWindow();
            });
          });

          app.on('window-all-closed', function () {
            if (process.platform !== 'darwin') app.quit();
          });" > main.js

          # 创建一个简单的 preload 文件
          echo "console.log('Preload script loaded');" > preload.js

          # 创建 package.json 用于 Electron
          echo "{ \"name\": \"xyzw_web_helper\", \"version\": \"1.0.0\", \"main\": \"main.js\", \"scripts\": { \"start\": \"electron .\" }, \"devDependencies\": { \"electron\": \"^latest\" }, \"build\": { \"appId\": \"com.example.xyzw_web_helper\", \"productName\": \"XYZW Web Helper\", \"directories\": { \"output\": \"out\" }, \"files\": [ \"dist/**/*\", \"main.js\", \"preload.js\" ], \"win\": { \"target\": \"nsis\", \"icon\": \"icon.ico\" } } }" > electron_package.json

      - name: Build Electron App
        run: |
          # 安装 electron
          npm install electron --save-dev
          # 构建 Electron 应用
          electron-builder --win --config electron_package.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xyzw_web_helper-Electron-App
          path: out/*.exe # 打包后的 .exe 文件位置
