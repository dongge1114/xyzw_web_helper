name: 名称：构建 EXE  # 这里可以写中文，显示在网页标题上

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest # Python 项目也需要在 Windows 上打包成 .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 使用较新的 Python 3.10 版本

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # 安装项目所需的所有 Python 库
          pip install pyinstaller       # 安装打包工具 PyInstaller

      - name: Build EXE with PyInstaller
        run: |
          # 使用 PyInstaller 打包 main.py 文件，生成一个独立的 .exe 文件
          pyinstaller --onefile --windowed main.py 
          # --onefile 参数：打包成一个单独的 .exe 文件
          # --windowed 参数：不显示控制台窗口（如果程序是 GUI 应用）

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 注意这里也要升级到 v4
        with:
          name: xyzw_web_helper-EXE
          path: dist/main.exe # PyInstaller 会将生成的 .exe 文件放在 dist/ 目录下
