name: Build FullStack App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: windows-latest
    outputs:
      frontend-built: ${{ steps.build.outputs.built }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Mark as built
        id: build
        run: echo "built=true" >> $GITHUB_OUTPUT

  build-electron:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Electron & Builder
        run: pnpm add -D electron electron-builder

      - name: Create Electron main process file
        run: |
          mkdir electron
          @'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow () {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                preload: path.join(__dirname, 'preload.js')
              }
            });

            // Load the built Vue app
            win.loadFile(path.join(__dirname, '../dist/index.html'));

            // Open DevTools in development
            if (!app.isPackaged) {
              win.webContents.openDevTools();
            }
          }

          app.whenReady().then(() => {
            createWindow();

            app.on('activate', () => {
              if (BrowserWindow.getAllWindows().length === 0) {
                createWindow();
              }
            });
          });

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });
          '@ | Out-File -FilePath electron\main.js -Encoding utf8

      - name: Create preload script
        run: |
          @'
          // Preload script for Electron
          console.log('Electron preload script loaded');
          '@ | Out-File -FilePath electron\preload.js -Encoding utf8

      - name: Create Electron config
        run: |
          @{
            name = "xyzw-web-helper"
            version = "1.0.0"
            description = "Web helper tool"
            main = "main.js"
            scripts = @{
              start = "electron ."
            }
            keywords = @()
            author = ""
            license = "ISC"
            devDependencies = @{
              electron = "^latest"
              "electron-builder" = "^latest"
            }
            build = @{
              appId = "com.electron.xyzwebhelper"
              productName = "XYZW Web Helper"
              directories = @{
                output = "release"
              }
              files = @(
                "../dist/**/*",
                "main.js",
                "preload.js"
              )
              win = @{
                target = "nsis"
                icon = "icon.ico"
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File -FilePath electron\package.json -Encoding utf8

      - name: Build Electron app
        run: |
          cd electron
          npx electron-builder --win --config package.json --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-windows
          path: electron\release\*.exe

  build-cloudflare-worker:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Check for _worker.js
        run: |
          if [ -f "dist/_worker.js" ]; then
            echo "_worker.js found in dist folder"
            mkdir -p cloudflare-package
            cp -r dist/* cloudflare-package/
            echo "# XYZW Cloudflare Worker Package
            ## Deployment Instructions
            1. Install Wrangler: \`npm install -g wrangler\`
            2. Login to Cloudflare: \`wrangler login\`
            3. Create a new Pages project in Cloudflare Dashboard
            4. Connect to Git or upload these files
            5. Set build command to: \`npm run build\`
            6. Set build output directory to: \`dist\`
            
            The _worker.js file will automatically enable Advanced Mode for API proxying." > cloudflare-package/README.md
          else
            echo "No _worker.js found in dist folder"
            mkdir -p cloudflare-package
            cp -r dist/* cloudflare-package/
            echo "# XYZW Frontend Package
            ## Local Preview
            1. Install Wrangler: \`npm install -g wrangler\`
            2. Build project: \`npm run build\`
            3. Preview: \`npx wrangler pages dev dist\`
            4. Access: http://localhost:8787
            
            For full functionality including API proxying, deploy to Cloudflare Pages which will automatically recognize _worker.js if present." > cloudflare-package/README.md
          fi

      - name: Upload Cloudflare package
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-package
          path: cloudflare-package/
