name: Build Electron App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run lint (optional)
        run: pnpm run lint

      - name: Format code (optional)
        run: pnpm run format

      - name: Build frontend
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Install Electron & Builder
        run: |
          pnpm add -D electron electron-builder

      - name: Create Electron main process file
        run: |
          mkdir electron
          echo "const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow () {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                preload: path.join(__dirname, 'preload.js')
              }
            });

            // Load the built Vue app
            win.loadFile(path.join(__dirname, '../dist/index.html'));

            // Open DevTools in development
            if (!app.isPackaged) {
              win.webContents.openDevTools();
            }
          }

          app.whenReady().then(() => {
            createWindow();

            app.on('activate', () => {
              if (BrowserWindow.getAllWindows().length === 0) {
                createWindow();
              }
            });
          });

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });" > electron/main.js

      - name: Create preload script
        run: |
          echo "// Preload script for Electron
          console.log('Electron preload script loaded');" > electron/preload.js

      - name: Create Electron config
        run: |
          echo "{
            \"name\": \"xyzw-web-helper\",
            \"version\": \"1.0.0\",
            \"description\": \"Web helper tool\",
            \"main\": \"main.js\",
            \"scripts\": {
              \"start\": \"electron .\"
            },
            \"keywords\": [],
            \"author\": \"\",
            \"license\": \"ISC\",
            \"devDependencies\": {
              \"electron\": \"^latest\",
              \"electron-builder\": \"^latest\"
            },
            \"build\": {
              \"appId\": \"com.electron.xyzwebhelper\",
              \"productName\": \"XYZW Web Helper\",
              \"directories\": {
                \"output\": \"release\"
              },
              \"files\": [
                \"../dist/**/*\",
                \"main.js\",
                \"preload.js\"
              ],
              \"win\": {
                \"target\": \"nsis\",
                \"icon\": \"icon.ico\"
              }
            }
          }" > electron/package.json

      - name: Build Electron app
        run: |
          cd electron
          npx electron-builder --win --config package.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-${{ matrix.os }}
          path: electron/release/*.exe
